<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure P2P Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #059669; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; text-align: center; }
        .app-container { max-width: 400px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 5px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-send { background: var(--primary); }
        .btn-receive { background: var(--secondary); }
        #receipt { display: none; border: 2px solid #333; padding: 15px; margin-top: 10px; background: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h3>ব্যালেন্স: <span id="bal">1000</span> টাকা</h3>
    </div>

    <div class="card">
        <input type="number" id="amt" placeholder="পরিমাণ লিখুন">
        <button class="btn-send" onclick="generate()">পেমেন্ট QR তৈরি করুন</button>
        <div id="qr-display" style="margin-top:15px;"></div>
    </div>

    <div class="card">
        <button class="btn-receive" id="scan-btn">QR স্ক্যান করে রিসিভ করুন</button>
        <div id="reader"></div>
    </div>

    <button onclick="addFund()" style="background: #d97706;">ফান্ড যোগ করুন</button>
</div>

<div id="receipt" class="card">
    <h4>পেমেন্ট রিসিট</h4>
    <p id="r-text"></p>
    <button onclick="downloadReceipt()" style="background:#555;">স্লিপ ডাউনলোড করুন</button>
</div>

<script>
    let bal = parseFloat(localStorage.getItem('myBal') || '1000');
    let usedIds = JSON.parse(localStorage.getItem('usedIds') || '[]');
    const MAX_LIMIT = 500000;
    const SECRET_PASSWORD = "123"; // আপনার পাসওয়ার্ড এখানে দিন

    document.getElementById('bal').innerText = bal;

    function updateUI() {
        localStorage.setItem('myBal', bal);
        document.getElementById('bal').innerText = bal;
    }

    function addFund() {
        let pass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
        if (pass === SECRET_PASSWORD) {
            let amount = parseFloat(prompt("কত টাকা যোগ করতে চান?"));
            if (!isNaN(amount)) {
                bal += amount;
                updateUI();
            }
        } else {
            alert("ভুল পাসওয়ার্ড!");
        }
    }

    function generate() {
        let amt = parseFloat(document.getElementById('amt').value);
        if (amt > bal) return alert("পর্যাপ্ত ব্যালেন্স নেই!");
        bal -= amt;
        updateUI();
        
        let txId = "TXN-" + Date.now();
        document.getElementById("qr-display").innerHTML = "";
        new QRCode(document.getElementById("qr-display"), "PAY:" + amt + ":" + txId);
    }

    document.getElementById('scan-btn').onclick = () => {
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (data) => {
            let parts = data.split(":");
            let amount = parseFloat(parts[1]);
            let txId = parts[2];

            if (usedIds.includes(txId)) {
                alert("সতর্কতা: এই পেমেন্ট স্লিপটি ইতিমধ্যে ব্যবহৃত হয়েছে!");
                scanner.stop();
                return;
            }

            if ((bal + amount) > MAX_LIMIT) {
                alert("ব্যালেন্স সীমা ৫ লক্ষ টাকা অতিক্রম করবে!");
            } else {
                bal += amount;
                usedIds.push(txId);
                localStorage.setItem('usedIds', JSON.stringify(usedIds));
                updateUI();
                showReceipt(amount);
                scanner.stop();
            }
        });
    };

    function showReceipt(amt) {
        document.getElementById('receipt').style.display = 'block';
        document.getElementById('r-text').innerText = "রিসিভ হয়েছে: " + amt + " টাকা\nসময়: " + new Date().toLocaleString();
    }

    function downloadReceipt() {
        html2canvas(document.querySelector("#receipt")).then(canvas => {
            let link = document.createElement("a");
            link.download = "receipt.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
